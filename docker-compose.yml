services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: realm_agent_dev
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  elixir-backend:
    build:
      context: ./backend-elixir
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://postgres:postgres@postgres/realm_agent_dev
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      BLIZZARD_CLIENT_ID: ${BLIZZARD_CLIENT_ID}
      BLIZZARD_CLIENT_SECRET: ${BLIZZARD_CLIENT_SECRET}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      WOW_REGION: ${WOW_REGION:-us}
      PHX_SERVER: "true"
    ports:
      - "4000:4000"
    volumes:
      - ./backend-elixir:/app
    command: sh -c "mix deps.get && mix ecto.create --quiet && mix ecto.migrate && mix phx.server"

volumes:
  postgres_data:
